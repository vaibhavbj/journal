<!-- TRADELOG FULL UI + FIREBASE (FINAL PRO VERSION) -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>TradeLog Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700&display=swap" rel="stylesheet"/>
<style>
body{margin:0;font-family:'Syne',sans-serif;background:#080c10;color:#e8edf2}
.container{max-width:900px;margin:auto;padding:20px}
.card{background:#111820;padding:20px;border-radius:12px;margin-bottom:15px}
input,select{width:100%;padding:10px;margin:6px 0;background:#0d1117;border:1px solid #1e2d3d;color:#fff;border-radius:8px}
button{padding:10px 16px;border:none;border-radius:8px;background:#00d4ff;color:#000;font-weight:bold;cursor:pointer}
.trade{border-bottom:1px solid #1e2d3d;padding:10px 0}
</style>
</head>
<body>

<div class="container">

<h2>TradeLog Pro (Cloud)</h2>

<div id="auth" class="card">
  <h3>Login / Register</h3>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="register()">Register</button>
  <button onclick="login()">Login</button>
</div>

<div id="app" style="display:none">

<div class="card">
  <button onclick="logout()">Logout</button>
</div>

<div class="card">
  <h3>Add Trade</h3>
  <input id="symbol" placeholder="Symbol">
  <input id="pnl" placeholder="P&L">
  <select id="type">
    <option value="long">Long</option>
    <option value="short">Short</option>
  </select>
  <button onclick="addTrade()">Save Trade</button>
</div>

<div class="card">
  <h3>Your Trades</h3>
  <div id="list"></div>
</div>

</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, query, where, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDnLCMHXO3668-HzVI548S5bSN3NYZZbOo",
  authDomain: "trading-journal-b9b8b.firebaseapp.com",
  projectId: "trading-journal-b9b8b",
  storageBucket: "trading-journal-b9b8b.firebasestorage.app",
  messagingSenderId: "397306524354",
  appId: "1:397306524354:web:bf90200f9c873cbbb4015b"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window.register = async () => {
  await createUserWithEmailAndPassword(auth,email.value,password.value);
  alert("Registered");
};

window.login = async () => {
  await signInWithEmailAndPassword(auth,email.value,password.value);
};

window.logout = async () => { await signOut(auth); };

window.addTrade = async () => {
  const user = auth.currentUser;
  await addDoc(collection(db,"trades"),{
    uid:user.uid,
    symbol:symbol.value,
    pnl:pnl.value,
    type:type.value,
    date:new Date().toISOString()
  });
  load();
};

async function load(){
  const user = auth.currentUser;
  const q = query(collection(db,"trades"), where("uid","==",user.uid));
  const snap = await getDocs(q);
  list.innerHTML="";
  snap.forEach(d=>{
    const t=d.data();
    const div=document.createElement("div");
    div.className="trade";
    div.innerHTML=`${t.symbol} (${t.type}) : ${t.pnl} <button onclick="del('${d.id}')">X</button>`;
    list.appendChild(div);
  });
}

window.del = async (id)=>{
  const user = auth.currentUser;
  await deleteDoc(doc(db,"trades",id));
  load();
};

onAuthStateChanged(auth,user=>{
  if(user){
    auth.style.display="none";
    app.style.display="block";
    load();
  }else{
    auth.style.display="block";
    app.style.display="none";
  }
});

</script>

</body>
</html>
